<!DOCTYPE html>
<html lang="zh-CN">
<head>

<link rel="stylesheet" href="assets/css/account-diagnosis.css">
<style>
  body { padding: 0 !important; background: transparent !important; }
  .main-content { margin-left: 0 !important; }
  .section-frame-list { display: flex; flex-direction: column; gap: 0; }
  .section-frame-wrap { width: 100%; }
  .section-frame { width: 100%; height: 640px; display: block; border: 0; background: transparent; overflow: hidden; }
</style>

<body>
<div class="main-content">
  <div class="section-frame-list" data-section-frame-list data-include-catalog="true" data-frame-id="new-catalog"></div>
</div>
<script src="assets/js/section-manifest.js"></script>
<script>
  window.ACCOUNT_DIAGNOSIS_SECTIONS = (window.ACCOUNT_DIAGNOSIS_SECTIONS || []).filter(function (section) {
    return section.id === 'catalog';
  });
</script>
<script src="assets/js/section-loader.js"></script>
