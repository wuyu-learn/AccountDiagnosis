<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问账户页面显示（815上线版）— 跟我投问AI</title>
<link rel="stylesheet" href="assets/css/account-diagnosis.css">
<style>
  body { padding: 20px 16px !important; background: transparent !important; }
  .main-content { margin-left: 0 !important; }
  .section-frame-list { display: flex; flex-direction: column; gap: 28px; }
  .section-frame-wrap { width: 100%; }
  .section-frame { width: 100%; height: 720px; display: block; border: 0; background: transparent; overflow: hidden; }
</style>
</head>
<body>
<div class="main-content">
  <div class="section-frame-list" data-section-frame-list data-frame-id="new"></div>
</div>
<script src="assets/js/section-manifest.js"></script>
<script src="assets/js/section-loader.js"></script>
<script>
  window.addEventListener('message', function (event) {
    var data = event.data || {};
    if (data.type !== 'scroll-section') return;

    function tryScroll(attempts) {
      var target = document.getElementById(data.id);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
      }
      if (attempts > 0) {
        setTimeout(function () { tryScroll(attempts - 1); }, 200);
      }
    }

    tryScroll(25);
  });
</script>
</body>
</html>
